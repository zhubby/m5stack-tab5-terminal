<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab5 股票终端</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101214;
        --panel: #181c20;
        --panel-2: #20262b;
        --line: #303941;
        --text: #f2f4f3;
        --muted: #9aa7a9;
        --accent: #e7b84b;
        --red: #ef5b5b;
        --green: #39b980;
        --focus: #75c7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        font-weight: 720;
        letter-spacing: 0;
      }

      .subline {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .status-strip {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .pill {
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 6px;
        padding: 6px 10px;
        color: var(--muted);
        font-size: 13px;
      }

      main {
        display: grid;
        grid-template-columns: 330px 1fr;
        gap: 18px;
        align-items: start;
      }

      section {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 8px;
      }

      .panel-head {
        min-height: 50px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0;
        font-size: 16px;
        font-weight: 680;
        letter-spacing: 0;
      }

      .form {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      input {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0d0f11;
        color: var(--text);
        padding: 9px 10px;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--text);
        padding: 8px 12px;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #17130a;
        font-weight: 680;
      }

      button.danger {
        color: var(--red);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 660;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
      }

      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .up {
        color: var(--red);
      }

      .down {
        color: var(--green);
      }

      .muted {
        color: var(--muted);
      }

      .empty {
        padding: 28px 16px;
        color: var(--muted);
      }

      .toast {
        margin-top: 14px;
        color: var(--muted);
        font-size: 13px;
        min-height: 20px;
      }

      @media (max-width: 840px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        .status-strip {
          justify-content: flex-start;
        }

        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>Tab5 股票终端</h1>
          <p class="subline">自选股管理</p>
        </div>
        <div class="status-strip" aria-live="polite">
          <span class="pill" id="health">后端: --</span>
          <span class="pill" id="stream">行情: --</span>
          <span class="pill" id="count">自选: 0</span>
        </div>
      </header>

      <main>
        <section aria-labelledby="form-title">
          <div class="panel-head">
            <h2 id="form-title">编辑</h2>
          </div>
          <form class="form" id="watch-form">
            <label>
              代码
              <input id="symbol" autocomplete="off" placeholder="600519.SH / 00700.HK" required />
            </label>
            <label>
              名称
              <input id="name" autocomplete="off" placeholder="贵州茅台" />
            </label>
            <label>
              Token
              <input id="token" autocomplete="off" type="password" />
            </label>
            <div class="actions">
              <button class="primary" type="submit">＋ 添加</button>
              <button id="refresh" type="button">↻ 刷新</button>
            </div>
            <div class="toast" id="toast"></div>
          </form>
        </section>

        <section aria-labelledby="list-title">
          <div class="panel-head">
            <h2 id="list-title">自选列表</h2>
            <span class="muted" id="updated">--</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>代码</th>
                  <th>名称</th>
                  <th>市场</th>
                  <th class="num">最新价</th>
                  <th class="num">涨跌幅</th>
                  <th>状态</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
            <div class="empty" id="empty" hidden>暂无自选股</div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const els = {
        form: document.querySelector("#watch-form"),
        symbol: document.querySelector("#symbol"),
        name: document.querySelector("#name"),
        token: document.querySelector("#token"),
        refresh: document.querySelector("#refresh"),
        toast: document.querySelector("#toast"),
        rows: document.querySelector("#rows"),
        empty: document.querySelector("#empty"),
        count: document.querySelector("#count"),
        health: document.querySelector("#health"),
        stream: document.querySelector("#stream"),
        updated: document.querySelector("#updated"),
      };
      const quotes = new Map();
      let watchlist = [];
      let socket;

      els.token.value = localStorage.getItem("deviceToken") || "";

      function authHeaders() {
        const token = els.token.value.trim();
        localStorage.setItem("deviceToken", token);
        return token ? { Authorization: `Bearer ${token}` } : {};
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...authHeaders(),
            ...(options.headers || {}),
          },
        });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        return response.json();
      }

      function toast(text) {
        els.toast.textContent = text;
      }

      function formatNumber(value) {
        return typeof value === "number" ? value.toFixed(2) : "--";
      }

      function rowClass(quote) {
        if (!quote) return "";
        if (quote.change > 0) return "up";
        if (quote.change < 0) return "down";
        return "";
      }

      function appendCell(row, text, className = "") {
        const cell = document.createElement("td");
        if (className) cell.className = className;
        cell.textContent = text;
        row.appendChild(cell);
        return cell;
      }

      function render() {
        els.rows.innerHTML = "";
        els.empty.hidden = watchlist.length !== 0;
        els.count.textContent = `自选: ${watchlist.length}`;
        for (const item of watchlist) {
          const quote = quotes.get(item.symbol);
          const tr = document.createElement("tr");
          appendCell(tr, item.symbol);
          appendCell(tr, item.name);
          appendCell(tr, item.market.toUpperCase());
          appendCell(tr, quote ? formatNumber(quote.last) : "--", `num ${rowClass(quote)}`);
          appendCell(tr, quote ? `${quote.change_pct.toFixed(2)}%` : "--", `num ${rowClass(quote)}`);
          appendCell(tr, quote ? quote.status : "--", "muted");
          const action = appendCell(tr, "", "num");
          const button = document.createElement("button");
          button.className = "danger";
          button.dataset.delete = item.symbol;
          button.type = "button";
          button.textContent = "× 删除";
          action.appendChild(button);
          els.rows.appendChild(tr);
        }
      }

      async function load() {
        const [health, list] = await Promise.all([
          api("/v1/health"),
          api("/v1/admin/watchlist"),
        ]);
        watchlist = list.items;
        els.health.textContent = `后端: ${health.status}`;
        els.updated.textContent = new Date().toLocaleTimeString();
        render();
      }

      function connectStream() {
        if (socket) socket.close();
        const token = els.token.value.trim();
        const qs = token ? `?token=${encodeURIComponent(token)}` : "";
        const url = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/v1/quotes/stream${qs}`;
        socket = new WebSocket(url);
        socket.addEventListener("open", () => (els.stream.textContent = "行情: connected"));
        socket.addEventListener("close", () => (els.stream.textContent = "行情: closed"));
        socket.addEventListener("error", () => (els.stream.textContent = "行情: error"));
        socket.addEventListener("message", (event) => {
          const message = JSON.parse(event.data);
          if (message.type === "snapshot") {
            quotes.clear();
            for (const quote of message.quotes) quotes.set(quote.symbol, quote);
          }
          if (message.type === "quote") quotes.set(message.quote.symbol, message.quote);
          if (message.type === "status") els.stream.textContent = `行情: ${message.status}`;
          render();
        });
      }

      els.form.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = {
            symbol: els.symbol.value.trim(),
            name: els.name.value.trim() || null,
          };
          const response = await api("/v1/admin/watchlist", {
            method: "POST",
            body: JSON.stringify(payload),
          });
          watchlist = response.items;
          els.symbol.value = "";
          els.name.value = "";
          toast("已保存");
          render();
        } catch (error) {
          toast(error.message);
        }
      });

      els.rows.addEventListener("click", async (event) => {
        const symbol = event.target.dataset.delete;
        if (!symbol) return;
        try {
          const response = await api(`/v1/admin/watchlist/${encodeURIComponent(symbol)}`, {
            method: "DELETE",
          });
          watchlist = response.items;
          quotes.delete(symbol);
          toast(response.deleted ? "已删除" : "未找到");
          render();
        } catch (error) {
          toast(error.message);
        }
      });

      els.refresh.addEventListener("click", async () => {
        try {
          await load();
          connectStream();
          toast("已刷新");
        } catch (error) {
          toast(error.message);
        }
      });

      load()
        .then(connectStream)
        .catch((error) => toast(error.message));
    </script>
  </body>
</html>
